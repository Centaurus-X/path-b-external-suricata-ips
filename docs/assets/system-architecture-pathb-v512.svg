<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="360" viewBox="0 0 1000 360" role="img" aria-labelledby="title desc">
<title id="title">Path-B v5.12 Lab Architecture</title>
<desc id="desc">Client traffic reaches Squid SSL-Bump, is adapted through ICAP, inspected by a Path-B ICAP server with Suricata backend, and then allowed or blocked.</desc>
<style>
  .box { fill:#1f2937; stroke:#94a3b8; stroke-width:2; rx:14; }
  .main { fill:#f8fafc; font-family:Arial, sans-serif; font-size:18px; font-weight:bold; text-anchor:middle; }
  .sub { fill:#cbd5e1; font-family:Arial, sans-serif; font-size:13px; text-anchor:middle; }
  .arrow { stroke:#38bdf8; stroke-width:3; fill:none; marker-end:url(#arrow); }
  .label { fill:#e2e8f0; font-family:Arial, sans-serif; font-size:13px; text-anchor:middle; }
</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/></marker></defs>
<rect width="1000" height="360" fill="#0f172a"/>
<text x="500" y="34" class="main">Path-B v5.12 External ICAP + Suricata Lab Path</text>
<rect x="50" y="95" width="160" height="110" class="box"/>
<text x="130" y="135" class="main">Test Client</text>
<text x="130" y="162" class="sub">Windows/Linux</text>
<text x="130" y="184" class="sub">Trusts Squid CA</text>
<rect x="290" y="80" width="200" height="140" class="box"/>
<text x="390" y="125" class="main">Squid Proxy VM</text>
<text x="390" y="153" class="sub">SSL-Bump</text>
<text x="390" y="175" class="sub">ICAP REQMOD/RESPMOD</text>
<rect x="590" y="80" width="230" height="140" class="box"/>
<text x="705" y="122" class="main">ICAP/Suricata VM</text>
<text x="705" y="150" class="sub">Path-B Python ICAP server</text>
<text x="705" y="172" class="sub">Synthetic PCAP -> Suricata</text>
<rect x="390" y="270" width="220" height="60" class="box"/>
<text x="500" y="294" class="main">Internet / Origin</text>
<text x="500" y="316" class="sub">Re-encrypted by Squid</text>
<path d="M210 150 L290 150" class="arrow"/>
<text x="250" y="138" class="label">TLS to proxy</text>
<path d="M490 150 L590 150" class="arrow"/>
<text x="545" y="138" class="label">ICAP cleartext</text>
<path d="M590 185 L490 185" class="arrow"/>
<text x="545" y="206" class="label">Allow / block verdict</text>
<path d="M390 220 L500 270" class="arrow"/>
<text x="440" y="254" class="label">TLS to origin</text>
</svg>
